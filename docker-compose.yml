version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist jokes.json edits across container restarts
      - ./data:/app/data
      # Mount the cookies file
      - ./cookies.txt:/app/cookies.txt
    environment:
      - YOUTUBE_COOKIES_FILE=/app/cookies.txt
    depends_on:
      - bgutil-pot

  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider
    restart: unless-stopped
    expose:
      - "4416"
