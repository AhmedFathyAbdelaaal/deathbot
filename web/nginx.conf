server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config and the entry document must never be cached, so a redeploy
    # or env change is picked up immediately.
    location = /assets/config.json {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Hashed build assets can cache forever.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path serves the Angular app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
